  <!-- Искры -->
  <g fill="#FFD66B">
    <path d="M398 112 l10 26 26 10 -26 10 -10 26 -10 -26 -26 -10 26 -10 z"/>
    <path d="M120 360 l7 18 18 7 -18 7 -7 18 -7 -18 -18 -7 18 -7 z" opacity="0.85"/>
